<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Python Tutor</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/images.ico') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C9.5 2 7.5 3 7.5 5v2H12v1H5C3.3 8 2 9.5 2 11.5v3C2 16.5 3.3 18 5 18h1.5v-2.5C6.5 13.5 8.5 12 11 12h5c2 0 3.5-1.3 3.5-3V5c0-2-2-3-4.5-3H12zm-1 2.5a1 1 0 110 2 1 1 0 010-2z" fill="white"/>
            <path d="M12 22c2.5 0 4.5-1 4.5-3v-2H12v-1h7c1.7 0 3-1.5 3-3.5v-3C22 7.5 20.7 6 19 6h-1.5v2.5C17.5 10.5 15.5 12 13 12H8c-2 0-3.5 1.3-3.5 3V19c0 2 2 3 4.5 3H12zm1-2.5a1 1 0 110-2 1 1 0 010 2z" fill="#FFD43B"/>
          </svg>
        </div>
        <div>
          <h1>Python Tutor</h1>
          <span class="badge">AI-powered</span>
        </div>
      </div>

      <div class="sidebar-section">
        <p class="section-label">Quick Topics</p>
        <div class="topic-list">
          <button class="topic-btn" data-q="What are Python variables and data types? Give me examples.">
            <span class="topic-icon">📦</span> Variables &amp; Types
          </button>
          <button class="topic-btn" data-q="Explain Python loops (for and while) with practical examples.">
            <span class="topic-icon">🔁</span> Loops
          </button>
          <button class="topic-btn" data-q="How do Python functions work? Cover parameters, return values, and scope.">
            <span class="topic-icon">⚡</span> Functions
          </button>
          <button class="topic-btn" data-q="What are Python lists, tuples, sets, and dictionaries? Show me examples.">
            <span class="topic-icon">📚</span> Data Structures
          </button>
          <button class="topic-btn" data-q="Explain object-oriented programming in Python with a practical class example.">
            <span class="topic-icon">🏗️</span> OOP &amp; Classes
          </button>
          <button class="topic-btn" data-q="How does error handling work in Python? Explain try, except, finally.">
            <span class="topic-icon">🛡️</span> Error Handling
          </button>
          <button class="topic-btn" data-q="What are Python list comprehensions and generator expressions?">
            <span class="topic-icon">✨</span> Comprehensions
          </button>
          <button class="topic-btn" data-q="Explain Python decorators — what they are and how to write one.">
            <span class="topic-icon">🎀</span> Decorators
          </button>
          <button class="topic-btn" data-q="How does async/await work in Python? Give me a real-world example.">
            <span class="topic-icon">⚙️</span> Async / Await
          </button>
          <button class="topic-btn" data-q="Give me a Python coding challenge to practice — intermediate level.">
            <span class="topic-icon">🏆</span> Practice Challenge
          </button>
        </div>
      </div>

      <div class="sidebar-footer">
        <button id="clear-btn" onclick="clearChat()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
          New conversation
        </button>
      </div>
    </aside>

    <!-- Main Chat -->
    <main class="chat-main">
      <div id="messages" class="messages">
        <div class="welcome">
          <div class="welcome-snake">🐍</div>
          <h2>What would you like to learn today?</h2>
          <p>Ask me anything about Python — from print("Hello, World!") to advanced async patterns.</p>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="user-input"
            placeholder="Ask a Python question..."
            rows="1"
            autofocus
          ></textarea>
          <button id="send-btn" onclick="sendMessage()" aria-label="Send message">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
      </div>
    </main>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
